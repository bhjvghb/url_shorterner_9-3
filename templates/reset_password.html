<!DOCTYPE html>
<html lang="{{ g.locale }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ _('reset_password_btn') }} - {{ _('site_title') }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    {% include '_pwa_head.html' %}
</head>
<body class="auth-centered">

<div class="auth-lang-bar">
    {% include '_lang_switcher.html' %}
</div>

<div class="container-narrow">
    <div class="card">
        <div class="text-center mb-6">
            <span class="logo-mark" style="margin: 0 auto var(--space-4);">L</span>
            <h2 style="margin-bottom: var(--space-2);">{{ _('set_new_password') }}</h2>
        </div>

        <form method="POST">
            <div class="form-group">
                <label class="form-label" for="password">{{ _('new_password') }}</label>
                <input type="password" class="form-input" id="password" name="password" required minlength="6" autocomplete="new-password">
            </div>
            <div class="form-group">
                <label class="form-label" for="confirm_password">{{ _('confirm_new_password') }}</label>
                <input type="password" class="form-input" id="confirm_password" name="confirm_password" required autocomplete="new-password">
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-full">{{ _('reset_password_btn') }}</button>
        </form>
    </div>
</div>

{% include '_pwa_script.html' %}
</body>
</html>
