<!DOCTYPE html>
<html lang="{{ g.locale }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ _('error_page_title') }} - {{ _('site_title') }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    {% include '_pwa_head.html' %}
</head>
<body class="auth-centered">

<div class="container-narrow">
    <div class="card text-center">

        <div style="font-size: 4rem; margin-bottom: var(--space-4); opacity: 0.85;">&#9888;</div>
        <h2 style="color: var(--error); margin-bottom: var(--space-4);">{{ _('error_heading') }}</h2>

        <div class="alert alert-error">
            <p style="font-weight: var(--weight-semibold); margin-bottom: var(--space-1);">{{ _('error_message_label') }}</p>
            <p>{{ message }}</p>
        </div>

        <div class="flex justify-center gap-3 mt-6">
            <a href="/" class="btn btn-primary btn-lg">{{ _('error_return_home') }}</a>
            <button class="btn btn-secondary btn-lg" onclick="history.back()">{{ _('error_return_back') }}</button>
        </div>

        <p class="mt-6 text-muted" style="font-size: var(--text-xs);">
            {{ _('error_contact_admin') }}<br>
            {{ _('error_code_label') }}: {{ status_code }}
        </p>
    </div>
</div>

{% include '_pwa_script.html' %}
</body>
</html>
