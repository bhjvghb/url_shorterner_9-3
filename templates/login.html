<!DOCTYPE html>
<html lang="{{ g.locale }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ _('sign_in') }} - {{ _('site_title') }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; }
        .card { border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .lang-bar { position: absolute; top: 15px; right: 20px; }
    </style>
</head>
<body>
    <div class="lang-bar">
        {% include '_lang_switcher.html' %}
    </div>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card p-4">
                    <h2 class="text-center mb-4">{{ _('sign_in') }}</h2>
                    <form method="POST">
                        <div class="mb-3">
                            <label for="username" class="form-label">{{ _('username_or_email') }}</label>
                            <input type="text" class="form-control" id="username" name="username" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">{{ _('password') }}</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">{{ _('sign_in') }}</button>
                    </form>
                    <div class="mt-3 text-center">
                        <a href="{{ url_for('register') }}">{{ _('no_account') }}</a> |
                        <a href="{{ url_for('forgot_password') }}">{{ _('forgot_password') }}</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
