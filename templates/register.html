<!DOCTYPE html>
<html lang="{{ g.locale }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ _('create_account') }} - {{ _('site_title') }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    {% include '_pwa_head.html' %}
</head>
<body class="auth-centered">

<div class="auth-lang-bar">
    {% include '_lang_switcher.html' %}
                {% include '_theme_toggle.html' %}
</div>

<div class="container-narrow">
    <div class="card">
        <div class="text-center mb-6">
            <span class="logo-mark" style="margin: 0 auto var(--space-4);">L</span>
            <h2 style="margin-bottom: var(--space-2);">{{ _('create_account') }}</h2>
            <p style="color: var(--text-secondary); font-size: var(--text-sm);">
                {{ _('register_subtitle') }}
            </p>
        </div>

        <form method="POST">
            <div class="form-group">
                <label class="form-label" for="username">{{ _('username') }}</label>
                <input type="text" class="form-input" id="username" name="username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label class="form-label" for="email">{{ _('email') }}</label>
                <input type="email" class="form-input" id="email" name="email" required autocomplete="email">
            </div>
            <div class="form-group">
                <label class="form-label" for="password">{{ _('password') }}</label>
                <input type="password" class="form-input" id="password" name="password" required autocomplete="new-password" minlength="6">
            </div>
            <div class="form-group">
                <label class="form-label" for="confirm_password">{{ _('confirm_password') }}</label>
                <input type="password" class="form-input" id="confirm_password" name="confirm_password" required autocomplete="new-password">
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-full">{{ _('register') }}</button>
        </form>

        <p class="text-center" style="margin-top: var(--space-6); font-size: var(--text-sm); color: var(--text-secondary);">
            {{ _('already_have_account') }} <a href="{{ url_for('login') }}">{{ _('sign_in') }}</a>
        </p>
    </div>
</div>

{% include '_pwa_script.html' %}
</body>
</html>
