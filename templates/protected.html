<!DOCTYPE html>
<html lang="{{ g.locale }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ _('password_required') }} - {{ _('site_title') }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    {% include '_pwa_head.html' %}
</head>
<body class="auth-centered">

<div class="container-narrow">
    <div class="card text-center">
        <div style="font-size: 2.5rem; margin-bottom: var(--space-4);">&#128274;</div>
        <h3 style="margin-bottom: var(--space-2);">{{ _('password_required') }}</h3>
        <p style="color: var(--text-secondary); font-size: var(--text-sm); margin-bottom: var(--space-6);">
            {{ _('password_required_desc', code=short_code) }}
        </p>

        {% if error %}
        <div class="alert alert-error py-2">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <input type="password" class="form-input form-input-lg text-center"
                       name="password" placeholder="{{ _('password') }}"
                       required autofocus>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-full">
                {{ _('unlock_link') }}
            </button>
        </form>
    </div>
</div>

{% include '_pwa_script.html' %}
</body>
</html>
