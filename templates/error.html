<!DOCTYPE html>
<html lang="{{ g.locale }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ _('error_page_title') }} - {{ _('site_title') }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #ff6b6b 0%, #c44569 100%); min-height: 100vh; display: flex; align-items: center; }
        .error-container { background: white; border-radius: 15px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); max-width: 600px; margin: 0 auto; }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-container">
            <div class="text-center mb-4">
                <h1 style="font-size:80px;color:#ff6b6b;">&#10060;</h1>
                <h2 class="text-danger">{{ _('error_heading') }}</h2>
            </div>
            <div class="alert alert-danger">
                <h4 class="alert-heading">{{ _('error_message_label') }}:</h4>
                <p class="mb-0">{{ message }}</p>
            </div>
            <div class="text-center mt-4">
                <a href="/" class="btn btn-primary btn-lg">{{ _('error_return_home') }}</a>
                <button class="btn btn-secondary btn-lg ms-2" onclick="history.back()">{{ _('error_return_back') }}</button>
            </div>
            <div class="mt-4 text-center text-muted small">
                <p>{{ _('error_contact_admin') }}</p>
                <p>{{ _('error_code_label') }}: {{ status_code }}</p>
            </div>
        </div>
    </div>
</body>
</html>
