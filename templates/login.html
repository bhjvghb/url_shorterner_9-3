<!DOCTYPE html>
<html lang="{{ g.locale }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ _('sign_in') }} - {{ _('site_title') }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    {% include '_pwa_head.html' %}
</head>
<body class="auth-centered">

<div class="auth-lang-bar">
    {% include '_lang_switcher.html' %}
</div>

<div class="container-narrow">
    <div class="card">
        <div class="text-center mb-6">
            <span class="logo-mark" style="margin: 0 auto var(--space-4);">L</span>
            <h2 style="margin-bottom: var(--space-2);">{{ _('sign_in') }}</h2>
            <p style="color: var(--text-secondary); font-size: var(--text-sm);">
                {{ _('sign_in_subtitle') }}
            </p>
        </div>

        <form method="POST">
            <div class="form-group">
                <label class="form-label" for="username">{{ _('username_or_email') }}</label>
                <input type="text" class="form-input" id="username" name="username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label class="form-label" for="password">{{ _('password') }}</label>
                <input type="password" class="form-input" id="password" name="password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-full">{{ _('sign_in') }}</button>
        </form>

        <p class="text-center" style="margin-top: var(--space-6); font-size: var(--text-sm); color: var(--text-secondary);">
            {{ _('no_account') }} <a href="{{ url_for('register') }}">{{ _('register') }}</a>
            &nbsp;|&nbsp;
            <a href="{{ url_for('forgot_password') }}">{{ _('forgot_password') }}</a>
        </p>
    </div>
</div>

{% include '_pwa_script.html' %}
</body>
</html>
