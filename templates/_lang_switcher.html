<div class="lang-switcher">
    <form id="lang-form" method="POST" action="/set-lang" style="display:inline;">
        <input type="hidden" name="next" value="{{ request.path }}">
        {% for loc in supported_locales %}
        <button type="submit"
                name="lang"
                value="{{ loc }}"
                class="lang-btn{% if g.locale == loc %} active{% endif %}"
                title="{{ locale_names[loc] }}">
            {% if loc == 'zh-CN' %}简
            {% elif loc == 'en' %}EN
            {% elif loc == 'zh-HK' %}粵
            {% endif %}
        </button>
        {% endfor %}
    </form>
</div>
