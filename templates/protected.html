<!DOCTYPE html>
<html lang="{{ g.locale }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ _('password_required') }} - {{ _('site_title') }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; }
        .card { border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card p-4">
                    <div class="text-center mb-3">
                        <h3>{{ _('password_required') }}</h3>
                        <p class="text-muted">{{ _('password_required_desc', code=short_code) }}</p>
                    </div>
                    {% if error %}
                    <div class="alert alert-danger py-2 text-center">{{ error }}</div>
                    {% endif %}
                    <form method="POST">
                        <div class="mb-3">
                            <input type="password"
                                   class="form-control form-control-lg text-center"
                                   name="password"
                                   placeholder="{{ _('password') }}"
                                   required
                                   autofocus
                                   style="border: 2px solid #e9ecef; border-radius: 10px;">
                        </div>
                        <button type="submit" class="btn btn-primary w-100" style="border-radius: 10px;">
                            {{ _('unlock_link') }}
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
